<!DOCTYPE html>
<html lang="{{ locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Všetky karty – Tarot Mentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% include 'nav.html' %}

    <div class="main-layout card-detail">
        <h1 class="cards-index-title">Všetky karty (78)</h1>
        <ul class="all-cards-list all-cards-list--index">
            {% for row in card_index_rows %}
            <li>
                <a href="{{ url_for('card_page', slug=row.slug) }}"><span class="mono">{{ row.id }}.</span> {{ row.name }}</a>
            </li>
            {% if row.sep_after %}
            <li class="cards-index-sep" aria-hidden="true"></li>
            {% endif %}
            {% endfor %}
        </ul>
    </div>
</body>
</html>
